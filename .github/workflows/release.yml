name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate release tag
        shell: pwsh
        run: |
          if ('${{ github.ref_name }}' -notmatch '^v\d+\.\d+\.\d+$') {
            throw 'Release tags must use the form vMAJOR.MINOR.PATCH.'
          }
      - name: Verify, scan, and test
        shell: pwsh
        run: |
          go mod verify
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...
          go test ./...
      - name: Build Goverter
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $commit = '${{ github.sha }}'
          $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $ldflags = "-s -w " +
            "-X github.com/taharaLovelace/Goverter/internal/buildinfo.Version=$version " +
            "-X github.com/taharaLovelace/Goverter/internal/buildinfo.Commit=$commit " +
            "-X github.com/taharaLovelace/Goverter/internal/buildinfo.Date=$date"
          go build -trimpath -ldflags $ldflags -o dist/goverter.exe ./cmd/goverter
      - name: Stage release dependencies
        shell: pwsh
        run: |
          ./scripts/prepare-ffmpeg.ps1
          ./scripts/prepare-go-licenses.ps1
          $env:GOVERTER_FFMPEG_DIR = Join-Path $PWD 'dist/tools'
          go test -tags integration ./integration
      - name: Build and test installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $version = '${{ github.ref_name }}'.TrimStart('v')
          iscc "/DMyAppVersion=$version" packaging/windows/goverter.iss
          $installer = Get-ChildItem dist/installer/Goverter-*-windows-x64.exe -File
          ./scripts/test-installer.ps1 -InstallerPath $installer.FullName
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$($installer.Name)" | Set-Content -NoNewline -Encoding ascii "$($installer.FullName).sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/installer/Goverter-*-windows-x64.exe
            dist/installer/Goverter-*-windows-x64.exe.sha256

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Verify and test
        run: |
          go mod verify
          go test ./...
          go test -tags integration ./integration
      - name: Build and package Goverter
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          version="${GITHUB_REF_NAME#v}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/taharaLovelace/Goverter/internal/buildinfo.Version=$version -X github.com/taharaLovelace/Goverter/internal/buildinfo.Commit=$GITHUB_SHA -X github.com/taharaLovelace/Goverter/internal/buildinfo.Date=$date"
          mkdir -p dist/linux
          go build -trimpath -ldflags "$ldflags" -o dist/linux/goverter ./cmd/goverter
          dist/linux/goverter --version
          dist/linux/goverter formats >/dev/null
          dist/linux/goverter completion bash >/dev/null
          cp README.md LICENSE THIRD_PARTY_NOTICES.md CHANGELOG.md dist/linux/
          archive="Goverter-$version-linux-x64.tar.gz"
          (cd dist/linux && tar -czf "../$archive" goverter README.md LICENSE THIRD_PARTY_NOTICES.md CHANGELOG.md)
          (cd dist && sha256sum "$archive" >"$archive.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/Goverter-*-linux-x64.tar.gz
            dist/Goverter-*-linux-x64.tar.gz.sha256

  publish:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' dist/* \
            --repo '${{ github.repository }}' \
            --verify-tag \
            --generate-notes \
            --title "Goverter ${{ github.ref_name }}"
