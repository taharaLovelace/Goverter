name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        shell: pwsh
        run: |
          if ('${{ github.ref_name }}' -notmatch '^v\d+\.\d+\.\d+$') {
            throw 'Release tags must use the form vMAJOR.MINOR.PATCH.'
          }

      - name: Verify modules
        run: go mod verify

      - name: Install pinned vulnerability scanner
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: Check reachable vulnerabilities
        run: govulncheck ./...

      - name: Test
        run: go test ./...

      - name: Build Goverter
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $commit = '${{ github.sha }}'
          $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $ldflags = "-s -w " +
            "-X github.com/taharaLovelace/Goverter/internal/buildinfo.Version=$version " +
            "-X github.com/taharaLovelace/Goverter/internal/buildinfo.Commit=$commit " +
            "-X github.com/taharaLovelace/Goverter/internal/buildinfo.Date=$date"
          go build -trimpath -ldflags $ldflags -o dist/goverter.exe ./cmd/goverter

      - name: Stage pinned FFmpeg
        shell: pwsh
        run: ./scripts/prepare-ffmpeg.ps1

      - name: Stage Go dependency licenses
        shell: pwsh
        run: ./scripts/prepare-go-licenses.ps1

      - name: Run FFmpeg integration tests
        shell: pwsh
        run: |
          $env:GOVERTER_FFMPEG_DIR = Join-Path $PWD 'dist/tools'
          go test -tags integration ./integration

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          iscc "/DMyAppVersion=$version" packaging/windows/goverter.iss

      - name: Test installer round trip
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist/installer/Goverter-*-windows-x64.exe -File
          ./scripts/test-installer.ps1 -InstallerPath $installer.FullName

      - name: Create checksums
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist/installer/Goverter-*-windows-x64.exe -File
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$($installer.Name)" | Set-Content -NoNewline -Encoding ascii "$($installer.FullName).sha256"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem dist/installer/Goverter-*-windows-x64.exe -File
          gh release create '${{ github.ref_name }}' `
            $installer.FullName `
            "$($installer.FullName).sha256" `
            --verify-tag `
            --generate-notes `
            --title "Goverter ${{ github.ref_name }}"
